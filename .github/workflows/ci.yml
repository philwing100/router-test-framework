name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit:
    name: Lint & offline tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run offline tests (no router required)
        run: |
          pytest tests/ \
            -m "not firewall and not dhcp and not throughput and not traffic and not second_device" \
            --tb=short \
            --junitxml=reports/junit.xml \
            -v
        continue-on-error: true   # router isn't available in CI; collect what we can

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/

  # ---------------------------------------------------------------------------
  # Hardware-in-the-loop job — only runs on self-hosted runners with a
  # physical router connected. Gate with an environment secret ROUTER_AVAILABLE.
  # ---------------------------------------------------------------------------
  hardware-tests:
    name: Hardware-in-the-loop (router required)
    runs-on: self-hosted
    if: ${{ vars.ROUTER_AVAILABLE == 'true' }}
    needs: lint-and-unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite against router
        env:
          ROUTER_PASSWORD: ${{ secrets.ROUTER_PASSWORD }}
          IPERF_SERVER: ${{ vars.IPERF_SERVER }}
        run: |
          pytest tests/ \
            --router-host=192.168.1.1 \
            --router-user=admin \
            --router-password="$ROUTER_PASSWORD" \
            --iperf-server="$IPERF_SERVER" \
            --tb=short \
            --junitxml=reports/junit-hardware.xml \
            -v

      - name: Upload hardware test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardware-test-report
          path: reports/
