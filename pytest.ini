[pytest]
testpaths = tests
markers =
    dhcp: DHCP lease and configuration tests (require router)
    firewall: iptables rule manipulation tests (require router)
    throughput: iperf3 performance tests (require router + iperf3 server)
    traffic: Scapy packet capture tests (require root/CAP_NET_RAW)
    second_device: Tests that require a second physical LAN device
addopts = --tb=short
